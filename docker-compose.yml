services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: si-laundry-demo-app
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8080}:80"
    env_file:
      - .env.docker
    volumes:
      - storage_data:/var/www/html/storage

volumes:
  storage_data:
